<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading…</title>
</head>
<body style="margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#eee">
<div id="msg" style="padding:48px;text-align:center;font-size:15px;opacity:.7">Loading your website…</div>
<script>
/* Polsia site viewer. Default mode reads the full site from the link hash (works on any static host, no backend).
   Optional short-link mode: paste the same Supabase URL + anon key as in js/supabase.js to load sites by id. */
var SUPABASE_URL='';
var SUPABASE_ANON_KEY='';
function b64dec(b){try{b=b.replace(/-/g,'+').replace(/_/g,'/');return decodeURIComponent(escape(atob(b)))}catch(e){return ''}}
function render(html){document.open();document.write(html);document.close()}
(function(){
var hash=location.hash||'';
var m=hash.match(/[#&]h=([^&]+)/);
if(m){var html=b64dec(decodeURIComponent(m[1]));if(html){render(html);return}}
var q=(location.search||'').match(/[?&]id=([^&]+)/);
if(q&&SUPABASE_URL&&SUPABASE_ANON_KEY){var id=decodeURIComponent(q[1]);fetch(SUPABASE_URL.replace(/[/]+$/,'')+'/rest/v1/polsia_sites?id=eq.'+encodeURIComponent(id)+'&select=html',{headers:{apikey:SUPABASE_ANON_KEY,authorization:'Bearer '+SUPABASE_ANON_KEY}}).then(function(r){return r.json()}).then(function(rows){if(rows&&rows[0]&&rows[0].html){render(rows[0].html)}else{document.getElementById('msg').textContent='Website not found.'}}).catch(function(){document.getElementById('msg').textContent='Could not load website.'});return}
document.getElementById('msg').textContent='No website data found in this link.';
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loading…</title>
<!-- Load Supabase credentials from the same config used by app.html -->
<script src="js/supabase.js"></script>
</head>
<body style="margin:0;font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#eee">
<div id="msg" style="padding:48px;text-align:center;font-size:15px;opacity:.7">Loading your website…</div>
<script>
function b64dec(b){try{b=b.replace(/-/g,'+').replace(/_/g,'/');return decodeURIComponent(escape(atob(b)))}catch(e){return ''}}
function render(html){document.open();document.write(html);document.close()}
(function(){
  // Try hash fallback first (#h=base64)
  var hash=location.hash||'';
  var m=hash.match(/[#&]h=([^&]+)/);
  if(m){var html=b64dec(decodeURIComponent(m[1]));if(html){render(html);return}}

  // Try short-link mode (?id=xxx) using Supabase from js/supabase.js
  var q=(location.search||'').match(/[?&]id=([^&]+)/);
  if(q){
    var id=decodeURIComponent(q[1]);
    // Get the Supabase URL and key — declared as const in js/supabase.js
    var sUrl=(typeof SUPABASE_URL!=='undefined')?SUPABASE_URL:'';
    var sKey=(typeof SUPABASE_ANON_KEY!=='undefined')?SUPABASE_ANON_KEY:'';
    if(sUrl&&sKey){
      fetch(sUrl.replace(/\/+$/,'')+'/rest/v1/polsia_sites?id=eq.'+encodeURIComponent(id)+'&select=html',{
        headers:{apikey:sKey,authorization:'Bearer '+sKey}
      }).then(function(r){return r.json()})
        .then(function(rows){
          if(rows&&rows[0]&&rows[0].html){render(rows[0].html)}
          else{document.getElementById('msg').textContent='Website not found. The link may have expired.'}
        })
        .catch(function(e){
          document.getElementById('msg').textContent='Could not load website: '+e.message
        });
      return;
    } else {
      document.getElementById('msg').textContent='Supabase is not configured. Please fill in SUPABASE_URL and SUPABASE_ANON_KEY in js/supabase.js';
      return;
    }
  }

  document.getElementById('msg').textContent='No website data found in this link.';
})();
</script>
</body>
</html>
